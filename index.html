<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="referrer" content="strict-origin-when-cross-origin" /><!-- helps avoid YouTube embed error 153 (when served over http) -->
<title>Digital Inauguration</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<!-- three.js vendored locally (offline-safe, pinned r161). Loaded as an ES module via import map. -->
<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
<style>
/* =================================================================
   BEHAVIOUR CHANGE CONCLAVE — DIGITAL INAUGURATION
   Single-file ceremonial lamp app · CSBC / BCC 2026 brand
   ================================================================= */
:root{
  --plum:#44113a;
  --wine:#6d1a3a;
  --raspberry:#9d1c4a;
  --magenta:#AC2251;
  --orange:#E8602C;        /* BCC "Conclave" accent */
  --orange-soft:#f0853f;
  --cream:#F3E9EF;
  --gold:#f4c95a;
}
*{box-sizing:border-box;}
html,body{
  margin:0;padding:0;width:100%;height:100%;
  background:#1a0716;color:var(--cream);
  overflow:hidden;
  font-family:"Manrope",system-ui,-apple-system,sans-serif;
  cursor:none;                       /* native cursor hidden — custom matchstick below */
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  -webkit-font-smoothing:antialiased;
}
/* THREE STACKED FULL-VIEWPORT LAYERS:
   #scene  (z1) — 2D backdrop: night, stars, embers, ambient glow + 2D fallback lamp
   #lamp3d (z2) — transparent WebGL canvas: the real 3D brass lamp
   #fx     (z3) — 2D overlay: flames, particles, glow bloom, confetti  */
canvas#scene{
  position:fixed;inset:0;width:100vw;height:100vh;display:block;
  image-rendering:auto;
  z-index:1;transition:opacity .85s ease;
}
canvas#lamp3d{
  position:fixed;inset:0;width:100vw;height:100vh;display:block;
  z-index:2;pointer-events:none;transition:opacity .85s ease;
}
canvas#fx{
  position:fixed;inset:0;width:100vw;height:100vh;display:block;
  z-index:3;pointer-events:none;transition:opacity .85s ease;
}
#vignette{
  position:fixed;inset:0;z-index:4;pointer-events:none;
  background:radial-gradient(125% 100% at 50% 40%, rgba(0,0,0,0) 36%, rgba(20,5,16,.40) 76%, rgba(12,3,10,.72) 100%);
  transition:opacity .85s ease;
}

/* ---------- UI overlay (text + dots), click-through ---------- */
#ui{position:fixed;inset:0;z-index:5;pointer-events:none;transition:opacity .85s ease;}

#prompt{
  position:absolute;left:0;right:0;bottom:14.5vh;text-align:center;
  font-family:"Manrope";font-weight:600;
  font-size:2.1vh;letter-spacing:.42em;color:var(--cream);
  text-transform:uppercase;opacity:0;transition:opacity .6s ease;
  text-shadow:0 0 18px rgba(243,233,239,.3);padding-left:.42em;
}
#prompt.show{opacity:.9;animation:promptPulse 2.6s ease-in-out infinite;}
@keyframes promptPulse{0%,100%{opacity:.5;}50%{opacity:.95;}}

#dots{
  position:absolute;left:0;right:0;bottom:6.5vh;display:flex;
  justify-content:center;gap:2.4vh;
}
#dots .dot{
  width:1.5vh;height:1.5vh;border-radius:50%;
  background:rgba(243,233,239,.08);
  border:2px solid rgba(243,233,239,.26);
  box-shadow:inset 0 0 4px rgba(0,0,0,.4);
  transition:all .5s cubic-bezier(.2,.9,.25,1);
}
#dots .dot.lit{
  background:radial-gradient(circle at 40% 32%, #fff7cf, var(--gold) 42%, var(--orange) 105%);
  border-color:rgba(255,231,160,.9);
  box-shadow:0 0 14px 3px rgba(244,201,90,.7),0 0 30px 7px rgba(232,96,44,.5);
  transform:scale(1.22);
}

/* end-reveal */
#reveal{
  position:absolute;left:0;right:0;top:57%;transform:translateY(-50%);
  text-align:center;opacity:0;transition:opacity 1s ease, filter 1s ease;
  filter:blur(8px);pointer-events:none;padding:0 6vw;
}
#reveal .logos{
  display:flex;align-items:center;justify-content:center;gap:3.4vh;
  margin-bottom:3.4vh;
}
#reveal .logos .logo{
  height:5.6vh;width:auto;opacity:.94;
  filter:drop-shadow(0 0 14px rgba(244,201,90,.22));
}
#reveal .logos .sep{
  width:1px;height:5vh;background:linear-gradient(rgba(243,233,239,0),rgba(243,233,239,.32),rgba(243,233,239,0));
}
#reveal .eyebrow{
  font-family:"Manrope";font-weight:700;
  font-size:1.8vh;letter-spacing:.5em;color:var(--orange);
  text-transform:uppercase;margin-bottom:2vh;padding-left:.5em;
  text-shadow:0 0 16px rgba(232,96,44,.5);
}
#reveal .title{
  font-family:"Manrope";font-weight:800;
  font-size:6.6vh;line-height:1.04;letter-spacing:-.01em;
  color:#fff3d8;
  text-shadow:0 0 22px rgba(244,201,90,.7),0 0 52px rgba(232,96,44,.55),0 0 100px rgba(172,34,81,.4);
}
#reveal.show{opacity:1;filter:blur(0);}

/* ---------- YouTube video layer ---------- */
#video{
  position:fixed;inset:0;z-index:6;background:#000;
  opacity:0;pointer-events:none;transition:opacity .85s ease;
}
#video iframe,#video #ytplayer,#video #localvideo{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000;object-fit:contain;}
body.to-video #scene,body.to-video #lamp3d,body.to-video #fx,body.to-video #vignette,body.to-video #ui{opacity:0;}
body.to-video #video{opacity:1;pointer-events:auto;}

/* after the spin: fade the lamp + night away, leaving only the title — which then crossfades to the video */
body.dim-lamp #scene,body.dim-lamp #lamp3d,body.dim-lamp #fx,body.dim-lamp #vignette{opacity:0;}
body.dim-lamp #dots{opacity:0;transition:opacity .6s ease;}

/* click-to-play fallback */
#clicktoplay{
  position:fixed;inset:0;z-index:7;display:none;
  align-items:center;justify-content:center;flex-direction:column;gap:3vh;
  background:radial-gradient(120% 120% at 50% 50%, rgba(110,26,58,.6), rgba(20,5,16,.94));
  cursor:none;
}
#clicktoplay.show{display:flex;}
#clicktoplay .play{
  font-family:"Manrope";font-weight:700;font-size:2.8vh;color:#fff3d8;
  letter-spacing:.16em;text-transform:uppercase;text-shadow:0 0 22px rgba(244,201,90,.7);
  animation:promptPulse 1.6s ease-in-out infinite;
}
#clicktoplay .tri{
  width:0;height:0;border-style:solid;border-width:4.5vh 0 4.5vh 7.5vh;
  border-color:transparent transparent transparent #fff3d8;
  filter:drop-shadow(0 0 20px rgba(232,96,44,.7));
}

/* ---------- START GATE ---------- */
#gate{
  position:fixed;inset:0;z-index:8;display:flex;
  align-items:center;justify-content:center;flex-direction:column;
  text-align:center;padding:6vh 6vw;
  background:
    radial-gradient(135% 115% at 50% 34%, rgba(110,26,58,.42) 0%, rgba(40,12,34,.84) 56%, rgba(14,4,12,.96) 100%);
  transition:opacity .8s ease;cursor:none;
}
#gate.hide{opacity:0;pointer-events:none;}
#gate .kicker{
  font-family:"Manrope";font-weight:700;
  font-size:1.7vh;letter-spacing:.55em;text-transform:uppercase;
  color:var(--orange);opacity:.95;margin-bottom:3vh;padding-left:.55em;
  text-shadow:0 0 18px rgba(232,96,44,.4);
}
#gate .event{
  font-family:"Manrope";font-weight:800;line-height:1.0;letter-spacing:-.02em;
  font-size:8.2vh;max-width:18ch;margin:0 auto;
}
#gate .event .ev-cream{color:#fbf3ec;text-shadow:0 0 30px rgba(251,243,236,.18);}
#gate .event .ev-orange{color:var(--orange);text-shadow:0 0 30px rgba(232,96,44,.45);}
#gate .subtitle{
  margin-top:2.2vh;font-family:"Manrope";font-weight:400;font-style:italic;
  font-size:2.3vh;letter-spacing:.01em;color:var(--cream);opacity:.78;max-width:34ch;
}
#gate .divider{
  width:8vh;height:3px;margin:4vh auto 3.4vh;
  background:linear-gradient(90deg,transparent,var(--orange),transparent);opacity:.8;
}
#gate .ilabel{
  font-family:"Manrope";font-weight:700;font-size:1.5vh;letter-spacing:.5em;
  text-transform:uppercase;color:var(--orange);opacity:.9;margin-bottom:1.4vh;padding-left:.5em;
}
#gate .initiative{
  font-family:"Manrope";font-weight:700;font-size:3.6vh;line-height:1.12;
  color:var(--cream);max-width:20ch;text-shadow:0 0 22px rgba(172,34,81,.4);
}
#gate .tap{
  margin-top:6vh;display:inline-flex;align-items:center;gap:1.2vh;
  font-family:"Manrope";font-weight:700;
  font-size:2.4vh;letter-spacing:.14em;text-transform:uppercase;
  color:#fff;background:linear-gradient(135deg,var(--orange) 0%,var(--magenta) 100%);
  padding:1.9vh 4.6vh;border-radius:999px;
  box-shadow:0 0 34px 4px rgba(232,96,44,.45),0 0 70px 12px rgba(172,34,81,.32);
  animation:tapPulse 2s ease-in-out infinite;
}
#gate .tap .glyph{font-size:1.7vh;opacity:.95;}
@keyframes tapPulse{
  0%,100%{transform:translateY(0) scale(1);box-shadow:0 0 26px 3px rgba(232,96,44,.4),0 0 56px 10px rgba(172,34,81,.28);}
  50%{transform:translateY(-.4vh) scale(1.035);box-shadow:0 0 42px 7px rgba(232,96,44,.62),0 0 90px 16px rgba(172,34,81,.42);}
}
#gate .legend{
  position:absolute;bottom:3vh;left:0;right:0;text-align:center;
  font-family:"Manrope";font-weight:500;font-size:1.4vh;letter-spacing:.26em;
  text-transform:uppercase;color:var(--cream);opacity:.3;
}

/* ---------- CUSTOM CURSOR: matchstick with flame ---------- */
#cursor{
  position:fixed;top:0;left:0;z-index:9;pointer-events:none;
  width:80px;height:100px;margin:-3px 0 0 -40px;   /* flame tip ≈ pointer */
  will-change:transform;
}
#cursor .cglow{
  position:absolute;left:50%;top:14px;width:74px;height:74px;margin:-37px 0 0 -37px;
  background:radial-gradient(circle,rgba(255,205,100,.55) 0%,rgba(232,96,44,.28) 40%,rgba(172,34,81,0) 72%);
  animation:cglow 1.7s ease-in-out infinite;
}
#cursor .flame{
  position:absolute;left:50%;top:2px;width:17px;height:27px;margin-left:-8.5px;
  background:linear-gradient(#ffe9a0 0%,#ffc23e 42%,#ff8a1e 72%,#e8602c 100%);
  clip-path:polygon(50% 0%,70% 28%,80% 60%,60% 100%,40% 100%,20% 60%,30% 28%);
  box-shadow:0 0 18px 5px rgba(232,96,44,.55);
  transform-origin:50% 100%;
  animation:flick .26s ease-in-out infinite alternate;
}
#cursor .flame .core{
  position:absolute;inset:0;
  background:linear-gradient(#fffdf2 0%,#ffe28a 55%,rgba(255,210,80,0) 100%);
  clip-path:polygon(50% 16%,64% 38%,70% 62%,56% 90%,44% 90%,30% 62%,36% 38%);
}
#cursor .head{
  position:absolute;left:50%;top:23px;width:10px;height:12px;margin-left:-5px;
  background:radial-gradient(circle at 38% 32%,#c64a32,#6e1820);border-radius:48% 48% 50% 50%;
  box-shadow:0 1px 2px rgba(0,0,0,.5);
}
#cursor .stick{
  position:absolute;left:50%;top:30px;width:5px;height:60px;margin-left:-2px;
  background:linear-gradient(90deg,#6e441c 0%,#c79a57 48%,#e7c98c 56%,#6e441c 100%);
  border-radius:3px;transform-origin:50% 0;transform:rotate(9deg);
  box-shadow:1px 1px 3px rgba(0,0,0,.45);
}
@keyframes flick{
  0%{transform:scaleY(.94) scaleX(1.02) skewX(-2deg);}
  100%{transform:scaleY(1.07) scaleX(.97) skewX(2deg);}
}
@keyframes cglow{0%,100%{opacity:.7;transform:scale(1);}50%{opacity:1;transform:scale(1.14);}}
/* after the inauguration is complete, hand control back to the normal mouse */
body.native-cursor{cursor:default;}
body.native-cursor #cursor{display:none;}
body.native-cursor #clicktoplay{cursor:default;}
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <canvas id="lamp3d"></canvas>
  <canvas id="fx"></canvas>
  <div id="vignette"></div>

  <div id="ui">
    <div id="prompt">Light the lamp</div>
    <div id="reveal">
      <div class="logos">
        <img class="logo" src="assets/csbc-logo.png" alt="Centre for Social and Behaviour Change" />
        <span class="sep"></span>
        <img class="logo" src="assets/ashoka-logo.png" alt="Ashoka University" />
      </div>
      <div class="eyebrow">Now Inaugurated</div>
      <div class="title" id="revealTitle">Initiative</div>
    </div>
    <div id="dots"></div>
  </div>

  <div id="video"><video id="localvideo" playsinline></video><div id="ytplayer"></div></div>

  <div id="clicktoplay">
    <div class="tri"></div>
    <div class="play">Click to play</div>
  </div>

  <div id="gate">
    <div class="kicker">Digital Inauguration</div>
    <div class="event" id="gateEvent">Event</div>
    <div class="subtitle" id="gateSubtitle"></div>
    <div class="divider"></div>
    <div class="ilabel">Inaugurating</div>
    <div class="initiative" id="gateInitiative">Initiative</div>
    <div class="tap"><span class="glyph">●</span> Tap to begin</div>
    <div class="legend">Click / Space · R reset · V video · M mute</div>
  </div>

  <div id="cursor">
    <div class="cglow"></div>
    <div class="stick"></div>
    <div class="head"></div>
    <div class="flame"><div class="core"></div></div>
  </div>

<script>
/* =======================================================================
   ============================  CONFIG  =================================
   ===== TODO: confirm / swap these before the live event ================
   ======================================================================= */
var CONFIG = {
  INITIATIVE_NAME : "AI, Behaviour, and Impact Accelerator",
  EVENT_NAME      : "Behaviour Change Conclave",        // brand lockup — last word renders in BCC orange
  EVENT_SUBTITLE  : "Behaviour in the age of Human and Machine Intelligence",
  EVENT_DATE      : "30 June 2026 · Jacaranda Hall, New Delhi",  // shown faintly (optional flavour)
  /* MOST RELIABLE for the live event: download the inauguration video as an .mp4,
     put it next to index.html, and set its filename here (e.g. "inauguration.mp4").
     A local file plays offline, needs no network, and avoids YouTube's file://
     embed error (153). Leave "" to use the YouTube fallback below.            */
  LOCAL_VIDEO_SRC : "",
  YOUTUBE_ID      : "0JLcRsz7H0Q",                      // https://youtu.be/0JLcRsz7H0Q
  /* NOTE: YouTube embeds are BLOCKED when opening this file directly (file://) —
     that causes "error 153". To use YouTube you MUST serve over http, e.g. run
     `python -m http.server` in this folder and open http://localhost:8000 .     */
  WICK_COUNT      : 6,
  SPIN_DURATION   : 2600,   // ms — ceremonial turntable spin of the 3D lamp
  HOLD_DURATION   : 3000,   // ms — beat on the "all lit" + title before the video
  TURNS           : 3,      // full Y-axis turns (integer => the six beaks end facing front)
  CLICKS_TO_PLAY  : 2       // deliberate clicks on the video overlay before playback starts (set 3 if preferred)
};
/* Do NOT hardcode stakeholder names. Five wicks, five dots, no names on screen. */

/* ----- inject config text into DOM ----- */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
(function(){
  var ev = CONFIG.EVENT_NAME.trim();
  var parts = ev.split(/\s+/);
  var last = parts.length>1 ? parts.pop() : '';
  var head = parts.join(' ');
  document.getElementById('gateEvent').innerHTML =
    '<span class="ev-cream">'+esc(head)+'</span>' + (last? ' <span class="ev-orange">'+esc(last)+'</span>' : '');
  document.getElementById('gateSubtitle').textContent  = CONFIG.EVENT_SUBTITLE;
  document.getElementById('gateInitiative').textContent= CONFIG.INITIATIVE_NAME;
  document.getElementById('revealTitle').textContent   = CONFIG.INITIATIVE_NAME;
  document.title = CONFIG.EVENT_NAME + " — Digital Inauguration";
})();

/* =======================================================================
   ============================  STATE  ==================================
   ======================================================================= */
var STATE = 'gate';           // gate | lighting | spin | hold | video | end
var litCount = 0, muted = false;
var spinStart = 0, holdStart = 0;

/* shared lamp anchor for the overlay (flames, glow, bursts). Updated each frame
   from the 3D projection when WebGL is active, or from lampMetrics in fallback. */
var WICKS = [];               // [{x,y,vis,lean}] screen positions of the five wick tips
var PPU = 10;                 // overlay pixels per lamp-unit (flame sizing)
var LAMPCX = 0, LAMPCY = 0;   // bowl centre on screen (glow / flourish origin)
var now = (typeof performance!=='undefined' && performance.now) ? function(){return performance.now();} : function(){return +new Date();};

/* =======================================================================
   ========================  CANVAS / RENDER  ============================
   ======================================================================= */
var canvas = document.getElementById('scene');     // back: backdrop/stars/embers (+2D fallback lamp)
var ctx = canvas.getContext('2d');
var fcanvas = document.getElementById('fx');        // front: flames/particles/glow/confetti
var fctx = fcanvas.getContext('2d');
var lamp3dCanvas = document.getElementById('lamp3d');
var W=0, H=0, DPR=1;

function resize(){
  DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  W = window.innerWidth; H = window.innerHeight;
  canvas.width=Math.round(W*DPR); canvas.height=Math.round(H*DPR);
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  fcanvas.width=Math.round(W*DPR); fcanvas.height=Math.round(H*DPR);
  fcanvas.style.width=W+'px'; fcanvas.style.height=H+'px';
  fctx.setTransform(DPR,0,0,DPR,0,0);
  if(window.LAMP3D && window.LAMP3D.setSize) window.LAMP3D.setSize(W,H,DPR);
  buildStars();
}
window.addEventListener('resize', resize);

function lampMetrics(){
  var p = Math.min(H*0.84/45, W*0.92/32);
  var ax = W/2;
  var ay = H*0.91 - 29.2*p;   // anchor = oil-bowl rim centre (local 0,0)
  return {p:p, ax:ax, ay:ay};
}
/* 5 wick positions across the oil-bowl rim (local grid-x) + wick-tip height.
   A traditional standing samai / kuthuvilakku: tiered base, knobbed stem,
   shallow oil well with five clean wicks. (Turned profiles E_* below.) */
var SPOUTS = [-10.5,-6.3,-2.1,2.1,6.3,10.5];   /* six wicks fanned across the 2D-fallback dish rim */
var WICK2D_Y = -3.25;   /* 2D-fallback wick-tip height (short lip just above the rim; flames anchor here) */

/* ---------- ambient: stars + embers ---------- */
var stars=[], embers=[];
function rnd(a,b){return a+Math.random()*(b-a);}
function buildStars(){
  stars=[];
  var n=Math.round((W*H)/16000);
  for(var i=0;i<n;i++) stars.push({x:rnd(0,W),y:rnd(0,H*0.82),s:rnd(0.5,1.7),a:rnd(0.12,0.55),tw:rnd(0,6.28),sp:rnd(0.4,1.3)});
  embers=[];
  for(var j=0;j<16;j++) embers.push({x:rnd(0,W),y:rnd(H*0.15,H*0.92),vx:rnd(-7,7),vy:rnd(-9,3),ph:rnd(0,6.28),r:rnd(1.3,2.5)});
}

/* ---------- particles + rings ---------- */
var particles=[], rings=[];
function spawnBurst(idx){
  var w=WICKS[idx], p=PPU;
  var sx, sy;
  if(w){ sx=w.x; sy=w.y; } else { var m=lampMetrics(); p=m.p; sx=m.ax+SPOUTS[idx]*m.p; sy=m.ay+WICK2D_Y*m.p; }
  var cols=['#fff7cf','#ffd24a','#ff8a1e','#e8602c','#AC2251','#F3E9EF'];
  for(var i=0;i<28;i++){
    var ang=rnd(-Math.PI,0), spd=rnd(40,185);
    particles.push({x:sx,y:sy,vx:Math.cos(ang)*spd*rnd(0.6,1.2),vy:Math.sin(ang)*spd-rnd(20,95),
      life:0,max:rnd(0.6,1.3),size:p*rnd(0.16,0.4),col:cols[(Math.random()*cols.length)|0],g:rnd(110,250)});
  }
  rings.push({x:sx,y:sy,life:0,max:0.7,r0:p*0.6,r1:p*7.5});
}
function spawnFlourish(){
  var cx=LAMPCX, cy=LAMPCY, p=PPU;
  var cols=['#fff7cf','#ffd24a','#ff8a1e','#e8602c','#AC2251','#9d1c4a','#F3E9EF'];
  for(var i=0;i<140;i++){
    var ang=rnd(0,6.2832), spd=rnd(120,480);
    particles.push({x:cx,y:cy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-50,
      life:0,max:rnd(0.9,1.9),size:p*rnd(0.15,0.48),col:cols[(Math.random()*cols.length)|0],g:rnd(50,150)});
  }
  rings.push({x:cx,y:cy,life:0,max:1.4,r0:p*1,r1:Math.max(W,H)*0.55});
}
function updateParticles(dt){
  for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.life+=dt;
    if(p.life>=p.max){particles.splice(i,1);continue;}
    p.vy+=p.g*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;}
  for(var r=rings.length-1;r>=0;r--){rings[r].life+=dt; if(rings[r].life>=rings[r].max) rings.splice(r,1);}
}
function drawParticles(){
  fctx.globalCompositeOperation='lighter';
  for(var i=0;i<particles.length;i++){var p=particles[i];var k=1-p.life/p.max;
    fctx.globalAlpha=Math.max(0,k);var s=Math.max(1,p.size*(0.55+0.45*k));
    fctx.fillStyle=p.col;fctx.fillRect(Math.round(p.x),Math.round(p.y),Math.ceil(s),Math.ceil(s));}
  fctx.globalAlpha=1;fctx.globalCompositeOperation='source-over';
}
function drawRings(){
  fctx.globalCompositeOperation='lighter';
  for(var i=0;i<rings.length;i++){var rg=rings[i];var k=rg.life/rg.max;var e=1-Math.pow(1-k,3);
    var rad=rg.r0+(rg.r1-rg.r0)*e;
    fctx.globalAlpha=Math.max(0,0.5*(1-k));
    fctx.strokeStyle='rgba(255,205,110,1)';fctx.lineWidth=Math.max(1.5,rg.r1*0.012*(1-k)+1.5);
    fctx.beginPath();fctx.arc(rg.x,rg.y,rad,0,6.2832);fctx.stroke();}
  fctx.globalAlpha=1;fctx.globalCompositeOperation='source-over';
}

/* ---------- confetti (fires when the lamp spins) ---------- */
var confetti=[];
var CONFETTI_COLS=['#E8602C','#AC2251','#9d1c4a','#f4c95a','#F3E9EF','#ffd24a','#7A1C3E'];
function mkConfetti(x,y,vx,vy){
  return {x:x,y:y,vx:vx,vy:vy,rot:rnd(0,6.2832),vr:rnd(-9,9),
    w:rnd(7,14),h:rnd(9,19),col:CONFETTI_COLS[(Math.random()*CONFETTI_COLS.length)|0],
    life:0,max:rnd(3.8,6.2),fp:rnd(0,6.2832),fa:rnd(1.6,3.6)};
}
function spawnConfetti(){
  var cx=LAMPCX, cy=LAMPCY;
  for(var i=0;i<150;i++){                 // celebratory burst from the lamp
    var ang=-Math.PI/2+rnd(-1.15,1.15), spd=rnd(280,720);
    confetti.push(mkConfetti(cx+rnd(-22,22), cy, Math.cos(ang)*spd, Math.sin(ang)*spd-rnd(0,120)));
  }
  for(var j=0;j<110;j++)                   // plus a rain from the top
    confetti.push(mkConfetti(rnd(0,W), rnd(-H*0.4,-10), rnd(-50,50), rnd(70,200)));
}
function updateConfetti(dt){
  for(var i=confetti.length-1;i>=0;i--){var c=confetti[i];c.life+=dt;
    if(c.life>=c.max || c.y>H+50){confetti.splice(i,1);continue;}
    c.vy+=560*dt; c.vx*=0.992;
    c.x+=(c.vx+Math.sin(c.life*c.fa+c.fp)*42)*dt; c.y+=c.vy*dt; c.rot+=c.vr*dt;}
}
function drawConfetti(){
  for(var i=0;i<confetti.length;i++){var c=confetti[i];var k=c.life/c.max;
    fctx.globalAlpha=k>0.82?Math.max(0,1-(k-0.82)/0.18):1;
    fctx.save();fctx.translate(c.x,c.y);fctx.rotate(c.rot);fctx.fillStyle=c.col;
    var flut=Math.abs(Math.cos(c.life*c.fa+c.fp));      // paper flip
    fctx.fillRect(-c.w/2,-c.h/2,c.w,c.h*(0.35+0.65*flut));
    fctx.restore();}
  fctx.globalAlpha=1;
}

/* =======================================================================
   ========================  DRAW HELPERS  ===============================
   ======================================================================= */
function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),Math.ceil(w),Math.ceil(h));}

/* brand backdrop: diagonal plum→raspberry + darkening + faint CSBC chevron mark */
function drawBackdrop(t){
  var g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#4a123c');
  g.addColorStop(0.45,'#7a1c46');
  g.addColorStop(0.72,'#8e1a46');
  g.addColorStop(1,'#33102a');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // soft brighter bloom upper area (brand warmth)
  ctx.globalCompositeOperation='lighter';
  var rg=ctx.createRadialGradient(W*0.5,H*0.18,0,W*0.5,H*0.18,H*0.9);
  rg.addColorStop(0,'rgba(180,40,90,0.18)');rg.addColorStop(1,'rgba(180,40,90,0)');
  ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='source-over';
  // bottom darkening so the flame glow reads
  var dg=ctx.createRadialGradient(W*0.5,H*0.92,0,W*0.5,H*0.92,Math.max(W,H)*0.8);
  dg.addColorStop(0,'rgba(12,3,10,0.55)');dg.addColorStop(0.6,'rgba(12,3,10,0.18)');dg.addColorStop(1,'rgba(12,3,10,0)');
  ctx.fillStyle=dg;ctx.fillRect(0,0,W,H);
  drawBrandMark(t);
}
/* faint flowing CSBC-style bracket/chevron watermark */
function drawBrandMark(t){
  var cy=H*0.5, half=H*0.30, drift=Math.sin(t*0.25)*5;
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
  var baseX=W*0.74;
  var defs=[[-half*0.62,0.046,half*0.16],[0,0.05,half*0.15],[half*0.62,0.044,half*0.14]];
  for(var i=0;i<defs.length;i++){
    var ox=defs[i][0], a=defs[i][1], lw=defs[i][2];
    ctx.strokeStyle='rgba(243,233,239,'+a+')';ctx.lineWidth=lw;
    ctx.beginPath();
    ctx.moveTo(baseX+ox-half*0.42, cy-half+drift);
    ctx.quadraticCurveTo(baseX+ox+half*0.5, cy, baseX+ox-half*0.42, cy+half+drift);
    ctx.stroke();
  }
  ctx.restore();
}

/* ===================  BRASS SAMAI LAMP  ===================
   Realistic turned-brass body (vector + metallic gradients, specular
   highlights, engraved rings) with soft glowing teardrop flames on top. */

/* turned elements: [unit-y, half-width] right edge, top -> bottom.
   Modelled on a Kerala nilavilakku: vase+spire finial, ribbed pillar with
   stacked bulbs, shallow petal bowl, wide flat domed foot. */
var E_FINIAL= [[-16.0,0.0],[-15.4,0.27],[-14.6,0.50],[-13.6,0.74],[-12.6,0.95],
               [-11.6,1.16],[-10.7,1.56],[-9.9,2.04],[-9.2,2.38],[-8.6,2.46],
               [-8.0,2.26],[-7.4,1.72],[-6.9,1.16],[-6.5,0.86],
               [-6.1,1.28],[-5.8,1.36],[-5.5,0.84]];   /* slender spire + onion bulb + bead + collar */
var E_BOWL  = [[-2.6,11.0],[-1.7,11.6],[-1.0,11.0],[-0.1,9.3],[0.9,6.8],[2.0,4.2],[3.0,2.5]];
var E_COLLAR= [[3.0,2.5],[3.5,1.58],[4.0,2.22],[4.5,1.42],[4.8,1.26]];
var E_KNOB1 = [[4.8,1.26],[5.2,1.84],[5.7,2.04],[6.2,1.84],[6.6,1.30]];
var E_RIBS  = [[6.6,1.44],[7.4,1.36],[8.2,1.28],[9.0,1.20],[9.8,1.12],[10.6,1.04],[11.2,1.00]]; /* long ribbed taper */
var E_BULB  = [[11.2,1.16],[11.9,2.36],[12.5,2.62],[13.2,2.36],[13.8,1.18]];
var E_KNOB2 = [[17.0,1.30],[17.8,2.46],[18.6,2.74],[19.4,2.46],[20.2,1.34]];   /* lower vase bulb */
/* centre dome/bell that rises out of the wide flat saucer foot (drawBase) */
var E_DOME  = [[20.2,1.42],[20.9,2.05],[21.7,2.9],[22.6,3.7],[23.6,4.4],
               [24.4,4.85],[25.1,5.0],[25.6,4.85],[26.0,4.4]];

/* polished-brass cross-section, lit upper-left: shadow edge -> rising tone ->
   crisp specular -> mid -> core shadow -> reflected environment rim -> dark edge.
   The extra stops kill the flat "banded" look and read as rounded turned metal. */
function brassGrad(cx,hw,p){
  var g=ctx.createLinearGradient((cx-hw)*p,0,(cx+hw)*p,0);
  g.addColorStop(0.00,'#241603');
  g.addColorStop(0.08,'#5a3c10');
  g.addColorStop(0.19,'#976c1e');
  g.addColorStop(0.31,'#d7aa45');
  g.addColorStop(0.40,'#fff7dc');   /* specular hotspot */
  g.addColorStop(0.48,'#efd384');
  g.addColorStop(0.59,'#c89e3b');
  g.addColorStop(0.72,'#8a611f');
  g.addColorStop(0.83,'#643f12');   /* core shadow */
  g.addColorStop(0.91,'#b88a31');   /* reflected environment rim-light */
  g.addColorStop(0.97,'#7c5418');
  g.addColorStop(1.00,'#2c1c08');
  return g;
}
/* smooth closed curve THROUGH the points (Catmull-Rom) — keeps spheres round */
function crPath(pts){
  var n=pts.length;
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(var i=0;i<n;i++){
    var p0=pts[(i-1+n)%n],p1=pts[i],p2=pts[(i+1)%n],p3=pts[(i+2)%n];
    ctx.bezierCurveTo(p1[0]+(p2[0]-p0[0])/6, p1[1]+(p2[1]-p0[1])/6,
                      p2[0]-(p3[0]-p1[0])/6, p2[1]-(p3[1]-p1[1])/6, p2[0],p2[1]);
  }
  ctx.closePath();
}
/* vertical "environment" pass over the clipped element: dark poles (roundness),
   a light catch near the top, plus a crisp specular streak — reads as real metal */
function metalShade(yTop,yBot,maxHW,p){
  var vg=ctx.createLinearGradient(0,yTop*p,0,yBot*p);
  vg.addColorStop(0.00,'rgba(14,7,2,0.50)');      // top edge curls away (AO)
  vg.addColorStop(0.12,'rgba(255,246,214,0.14)'); // sky / light catch
  vg.addColorStop(0.34,'rgba(0,0,0,0)');
  vg.addColorStop(0.62,'rgba(14,7,2,0.10)');
  vg.addColorStop(0.80,'rgba(255,210,140,0.07)'); // warm bounce from below
  vg.addColorStop(1.00,'rgba(14,7,2,0.55)');      // bottom edge (AO / contact)
  ctx.fillStyle=vg;ctx.fillRect(-maxHW*p-2,yTop*p-1,2*maxHW*p+4,(yBot-yTop)*p+2);
  ctx.globalCompositeOperation='lighter';
  // crisp primary specular streak, left of centre
  var hw2=maxHW*0.11, hx=-maxHW*0.26, y0=(yTop+0.05*(yBot-yTop))*p, hh=0.84*(yBot-yTop)*p;
  var hg=ctx.createLinearGradient((hx-hw2)*p,0,(hx+hw2)*p,0);
  hg.addColorStop(0,'rgba(255,252,238,0)');hg.addColorStop(0.5,'rgba(255,254,248,0.62)');hg.addColorStop(1,'rgba(255,252,238,0)');
  ctx.fillStyle=hg;ctx.fillRect((hx-hw2)*p,y0,2*hw2*p,hh);
  // faint secondary glint near the reflected rim
  var w3=maxHW*0.07, x3=maxHW*0.34;
  var hg2=ctx.createLinearGradient((x3-w3)*p,0,(x3+w3)*p,0);
  hg2.addColorStop(0,'rgba(255,236,196,0)');hg2.addColorStop(0.5,'rgba(255,240,205,0.22)');hg2.addColorStop(1,'rgba(255,236,196,0)');
  ctx.fillStyle=hg2;ctx.fillRect((x3-w3)*p,y0,2*w3*p,hh);
  ctx.globalCompositeOperation='source-over';
}
function drawTurned(prof,p){
  var maxHW=0,i;for(i=0;i<prof.length;i++)if(prof[i][1]>maxHW)maxHW=prof[i][1];
  var yTop=prof[0][0], yBot=prof[prof.length-1][0];
  var pts=[];
  for(i=0;i<prof.length;i++)pts.push([prof[i][1]*p,prof[i][0]*p]);
  for(i=prof.length-1;i>=0;i--)pts.push([-prof[i][1]*p,prof[i][0]*p]);
  ctx.save();
  ctx.beginPath();crPath(pts);
  ctx.fillStyle=brassGrad(0,maxHW,p);ctx.fill();
  ctx.clip();
  metalShade(yTop,yBot,maxHW,p);
  ctx.restore();
  ctx.beginPath();crPath(pts);
  ctx.lineJoin='round';ctx.lineWidth=Math.max(1,p*0.05);
  ctx.strokeStyle='rgba(30,16,3,0.40)';ctx.stroke();
}
function drawColumn(y0,y1,hw,p){       /* straight turned stem segment */
  ctx.save();
  ctx.beginPath();ctx.rect(-hw*p,y0*p,2*hw*p,(y1-y0)*p);
  ctx.fillStyle=brassGrad(0,hw,p);ctx.fill();
  ctx.clip();
  metalShade(y0,y1,hw,p);
  ctx.restore();
  var e=Math.max(1,p*0.07);
  ctx.fillStyle='rgba(34,18,4,0.5)';
  ctx.fillRect(-hw*p,y0*p,e,(y1-y0)*p); ctx.fillRect(hw*p-e,y0*p,e,(y1-y0)*p);
}
function sphereHi(cy,r,p){             /* spherical highlight on a knob/bulb */
  ctx.globalCompositeOperation='lighter';
  var hx=-r*0.32*p, hy=(cy-r*0.42)*p, hr=r*0.92*p;
  var g=ctx.createRadialGradient(hx,hy,0,hx,hy,hr);
  g.addColorStop(0,'rgba(255,248,222,0.55)');g.addColorStop(0.5,'rgba(255,240,200,0.18)');g.addColorStop(1,'rgba(255,245,210,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(hx,hy,hr,0,6.2832);ctx.fill();
  // tiny sharp catch-light
  var cr=r*0.16*p;
  var g2=ctx.createRadialGradient(hx,hy,0,hx,hy,cr);
  g2.addColorStop(0,'rgba(255,255,250,0.7)');g2.addColorStop(1,'rgba(255,255,250,0)');
  ctx.fillStyle=g2;ctx.beginPath();ctx.arc(hx,hy,cr,0,6.2832);ctx.fill();
  ctx.globalCompositeOperation='source-over';
}
function ringGroove(y,hw,p){           /* engraved lathe ring: dark cut + bright lower lip */
  ctx.lineWidth=Math.max(1,p*0.08);
  ctx.strokeStyle='rgba(34,18,4,0.55)';
  ctx.beginPath();ctx.moveTo(-hw*p,y*p);ctx.lineTo(hw*p,y*p);ctx.stroke();
  ctx.lineWidth=Math.max(1,p*0.06);
  ctx.strokeStyle='rgba(255,242,205,0.28)';
  ctx.beginPath();ctx.moveTo(-hw*p,(y+0.15)*p);ctx.lineTo(hw*p,(y+0.15)*p);ctx.stroke();
}
function drawBeak(s,p){     /* short, broad brass lip growing out of the rim (not a floating spike) */
  var dir=s<0?-1:(s>0?1:0), wx=s+dir*1.0, wy=WICK2D_Y;   // wick tip leans outward, just above the rim
  // wide base that overlaps the bowl wall -> small rounded lip at (wx,wy)
  ctx.beginPath();
  ctx.moveTo((s-1.9)*p,-1.7*p);                              // wide base on the rim (inner side)
  ctx.quadraticCurveTo((s-0.3)*p,-2.6*p,(wx-0.5)*p, wy*p);   // left edge sweeps up to the lip
  ctx.quadraticCurveTo(wx*p,(wy-0.42)*p,(wx+0.5)*p, wy*p);   // rounded lip tip
  ctx.quadraticCurveTo((s+0.5)*p,-2.6*p,(s+1.9)*p,-1.7*p);   // right edge back down to base
  ctx.quadraticCurveTo(s*p,-1.45*p,(s-1.9)*p,-1.7*p);        // base curve sits on / overlaps the rim
  ctx.closePath();
  ctx.fillStyle=brassGrad(s+dir*0.5,1.9,p);ctx.fill();
  ctx.lineWidth=Math.max(1,p*0.05);ctx.strokeStyle='rgba(36,20,5,0.4)';ctx.stroke();
  // bright lip highlight
  ctx.globalCompositeOperation='lighter';
  var lg=ctx.createLinearGradient((wx-0.5)*p,wy*p,(wx+0.5)*p,wy*p);
  lg.addColorStop(0,'rgba(255,248,220,0)');lg.addColorStop(0.5,'rgba(255,250,232,0.5)');lg.addColorStop(1,'rgba(255,248,220,0)');
  ctx.fillStyle=lg;ctx.fillRect((wx-0.6)*p,(wy-0.15)*p,1.2*p,0.5*p);
  ctx.globalCompositeOperation='source-over';
  // dark cotton wick nub at the very tip (the flame anchors here)
  ctx.fillStyle='#2a1607';
  ctx.beginPath();ctx.ellipse(wx*p,wy*p,0.22*p,0.4*p,0,0,6.2832);ctx.fill();
}

/* wide flat brass saucer foot with a small bell at its centre (the defining
   silhouette of a Kerala nilavilakku base) + a soft contact shadow on the floor */
function drawBase(p){
  var by=25.9, brx=11.6, bry=2.0, th=1.05;      // brim plane, radii, edge thickness
  // soft contact shadow on the floor under the tray
  ctx.save();ctx.translate(0,(by+th+0.4)*p);ctx.scale(1,0.20);
  var cs=ctx.createRadialGradient(0,0,0,0,0,brx*1.18*p);
  cs.addColorStop(0,'rgba(8,3,2,0.5)');cs.addColorStop(0.6,'rgba(8,3,2,0.26)');cs.addColorStop(1,'rgba(8,3,2,0)');
  ctx.fillStyle=cs;ctx.beginPath();ctx.arc(0,0,brx*1.18*p,0,6.2832);ctx.fill();ctx.restore();

  // turned front edge of the plate (lower ellipse, horizontal brass) — gives real thickness
  ctx.beginPath();ctx.ellipse(0,(by+th)*p,brx*p,bry*p,0,0,6.2832);
  ctx.fillStyle=brassGrad(0,brx,p);ctx.fill();
  // dark tuck under the plate lip (AO separating top surface from edge)
  ctx.beginPath();ctx.ellipse(0,(by+0.32)*p,brx*0.992*p,bry*p,0,0.04*Math.PI,0.96*Math.PI);
  ctx.lineWidth=Math.max(1,p*0.22);ctx.strokeStyle='rgba(26,15,4,0.5)';ctx.stroke();

  // top plate surface — radial brass, lit from upper-left
  ctx.beginPath();ctx.ellipse(0,by*p,brx*p,bry*p,0,0,6.2832);
  var bg=ctx.createRadialGradient(-brx*0.32*p,(by-bry*0.55)*p,0,0,by*p,brx*1.08*p);
  bg.addColorStop(0,'#fff4cf');bg.addColorStop(0.15,'#eccb72');bg.addColorStop(0.4,'#caa03c');
  bg.addColorStop(0.7,'#9c7126');bg.addColorStop(0.88,'#6f4c18');bg.addColorStop(1,'#46300e');
  ctx.fillStyle=bg;ctx.fill();
  // concentric turned grooves on the tray
  for(var ri=0;ri<4;ri++){var f=0.46+ri*0.16;
    ctx.lineWidth=Math.max(1,p*0.045);ctx.strokeStyle='rgba(36,21,6,0.32)';
    ctx.beginPath();ctx.ellipse(0,by*p,brx*f*p,bry*f*p,0,0,6.2832);ctx.stroke();
    ctx.strokeStyle='rgba(255,238,190,0.13)';
    ctx.beginPath();ctx.ellipse(0,(by+0.07)*p,brx*f*p,bry*f*p,0,0.05*Math.PI,0.95*Math.PI);ctx.stroke();}
  // bright catch-light along the front rim
  ctx.globalCompositeOperation='lighter';
  ctx.lineWidth=Math.max(1.2,p*0.13);
  var hl=ctx.createLinearGradient(-brx*p,0,brx*p,0);
  hl.addColorStop(0,'rgba(255,245,210,0)');hl.addColorStop(0.30,'rgba(255,251,232,0.6)');hl.addColorStop(0.62,'rgba(255,245,210,0)');
  ctx.strokeStyle=hl;
  ctx.beginPath();ctx.ellipse(0,(by+th)*p,brx*p,bry*p,0,0.12*Math.PI,0.92*Math.PI);ctx.stroke();
  ctx.globalCompositeOperation='source-over';

  // central bell/dome rising to the stem
  drawTurned(E_DOME,p);
  ringGroove(24.4,4.85,p);
}

/* draw the whole lamp (caller already translated to anchor / rotated); p = unit size */
function drawLamp(p){
  drawBase(p);
  drawTurned(E_KNOB2,p); sphereHi(18.6,2.74,p);
  drawColumn(13.8,17.0,1.04,p); ringGroove(15.4,1.04,p);
  drawTurned(E_BULB,p);  sphereHi(12.5,2.62,p);
  drawTurned(E_RIBS,p);                                   /* ribbed taper */
  for(var rb=0;rb<7;rb++) ringGroove(7.1+rb*0.58, 1.42-rb*0.055, p);
  drawTurned(E_KNOB1,p); sphereHi(5.7,2.04,p);
  drawTurned(E_COLLAR,p);
  drawTurned(E_BOWL,p);

  // recessed oil well (warm brass, gently lit) with a soft reflection
  ctx.beginPath();ctx.ellipse(0,-1.1*p,9.0*p,1.6*p,0,0,6.2832);
  var ow=ctx.createRadialGradient(-2.6*p,-1.7*p,0,0,-1.1*p,9.0*p);
  ow.addColorStop(0,'#7d5520');ow.addColorStop(0.55,'#42290d');ow.addColorStop(1,'#241606');
  ctx.fillStyle=ow;ctx.fill();
  ctx.lineWidth=Math.max(1,p*0.16);ctx.strokeStyle='rgba(18,10,4,0.5)';ctx.stroke();
  ctx.globalCompositeOperation='lighter';
  var rf=ctx.createRadialGradient(2.4*p,-0.7*p,0,2.4*p,-0.7*p,4.2*p);
  rf.addColorStop(0,'rgba(255,190,100,0.2)');rf.addColorStop(1,'rgba(255,185,95,0)');
  ctx.fillStyle=rf;ctx.beginPath();ctx.ellipse(2.4*p,-0.7*p,4.2*p,0.9*p,0,0,6.2832);ctx.fill();
  ctx.globalCompositeOperation='source-over';

  // bright rim crest (top half of the rim catching light)
  ctx.lineWidth=Math.max(1.5,p*0.22);
  var rh=ctx.createLinearGradient(-11.4*p,0,11.4*p,0);
  rh.addColorStop(0,'rgba(255,240,200,0)');rh.addColorStop(0.5,'rgba(255,250,225,0.65)');rh.addColorStop(1,'rgba(255,240,200,0)');
  ctx.strokeStyle=rh;
  ctx.beginPath();ctx.ellipse(0,-2.3*p,11.4*p,1.45*p,0,Math.PI,2*Math.PI);ctx.stroke();

  // petal flower: soft radial creases dividing the front rim into petals (tips at the spouts)
  var pv=[-8.0,-2.7,2.7,8.0];
  ctx.lineCap='round';
  for(var pi=0;pi<pv.length;pi++){var X=pv[pi];
    var yf=-2.3+1.42*Math.sqrt(Math.max(0,1-(X/11.4)*(X/11.4)));
    ctx.lineWidth=Math.max(1,p*0.07);ctx.strokeStyle='rgba(30,17,5,0.3)';
    ctx.beginPath();ctx.moveTo(X*p,yf*p);ctx.lineTo(X*0.55*p,(-0.9)*p);ctx.stroke();
    ctx.lineWidth=Math.max(1,p*0.05);ctx.strokeStyle='rgba(255,240,200,0.16)';  // lit edge of the next petal
    ctx.beginPath();ctx.moveTo((X+0.18)*p,yf*p);ctx.lineTo((X*0.55+0.18)*p,(-0.9)*p);ctx.stroke();
  }
  ctx.lineCap='butt';

  // central finial (vase + tall spire) rising from the bowl centre, behind the flames
  drawColumn(-5.5,-1.0,0.8,p);
  drawTurned(E_FINIAL,p); sphereHi(-8.6,2.46,p);

  for(var w=0;w<SPOUTS.length;w++) drawBeak(SPOUTS[w],p);   // five wicks

  // warm lit-glow wash over the brass, grows with each flame (torchlight)
  var litK=litCount/CONFIG.WICK_COUNT;
  if(litK>0){
    ctx.globalCompositeOperation='lighter';
    var rw=ctx.createRadialGradient(0,-1*p,0,0,-1*p,16*p);
    rw.addColorStop(0,'rgba(255,170,70,'+(0.20*litK)+')');rw.addColorStop(1,'rgba(255,170,70,0)');
    ctx.fillStyle=rw;ctx.fillRect(-16*p,-5*p,32*p,12*p);
    ctx.globalCompositeOperation='source-over';
  }
}

/* smooth leaning teardrop outline (front overlay): rounded base -> point at tip */
function flameOutline(bx,by,tipx,tipy,wmax){
  var midy=by+(tipy-by)*0.40;
  fctx.beginPath();
  fctx.moveTo(bx-wmax*0.3,by);
  fctx.quadraticCurveTo(bx-wmax, midy, tipx, tipy);       // left edge swells, draws to tip
  fctx.quadraticCurveTo(bx+wmax, midy, bx+wmax*0.3,by);   // right edge back down
  fctx.quadraticCurveTo(bx, by+wmax*0.45, bx-wmax*0.3,by);// rounded bottom
  fctx.closePath();
}
/* realistic oil-lamp flame drawn at an absolute screen point (x,y) — the flame
   bridge: in 3D the point is the projected wick tip, in 2D the SPOUT position.
   p = pixels per lamp-unit, lean = horizontal splay (units), fa = fade alpha. */
function drawFlameAt(x,y,p,t,seed,lean,fa){
  var bx=x, by=y+3;   // nudge the rounded base down a few px so the fire overlaps the brass wick
  var f1=Math.sin(t*7.7+seed), f2=Math.sin(t*4.3+seed*1.7), f3=Math.sin(t*15.1+seed*0.7);
  var intensity=0.62+0.38*(0.6*f1+0.3*f2+0.1*f3);        // overall brightness 0.24..1
  var sway=(0.55*Math.sin(t*3.1+seed)+0.45*Math.sin(t*6.3+seed*2.1))*0.5 + (lean||0);
  var h=(5.0+0.8*intensity+0.25*f2)*p;                   // flame height
  var wmax=(1.42+0.12*f3)*p;                             // half max width
  var tipx=bx+sway*p, tipy=by-h;

  fctx.save();
  fctx.globalAlpha=(fa==null?1:fa);
  fctx.globalCompositeOperation='lighter';

  // 1. soft outer halo / torch glow
  var hr=h*1.15, hy=by-h*0.42;
  var hg=fctx.createRadialGradient(bx,hy,0,bx,hy,hr);
  hg.addColorStop(0,'rgba(255,170,70,'+(0.30*intensity)+')');
  hg.addColorStop(0.5,'rgba(255,120,40,'+(0.14*intensity)+')');
  hg.addColorStop(1,'rgba(230,80,30,0)');
  fctx.fillStyle=hg;fctx.beginPath();fctx.arc(bx,hy,hr,0,6.2832);fctx.fill();

  // 2. outer flame body — deep amber fading to the point
  flameOutline(bx,by,tipx,tipy,wmax);
  var og=fctx.createLinearGradient(0,by,0,tipy);
  og.addColorStop(0.00,'rgba(255,120,24,0.50)');
  og.addColorStop(0.45,'rgba(255,140,32,0.60)');
  og.addColorStop(0.80,'rgba(255,96,24,0.28)');
  og.addColorStop(1.00,'rgba(220,60,20,0)');
  fctx.fillStyle=og;fctx.fill();

  // 3. inner flame — golden yellow
  var iw=wmax*0.58, ih=h*0.74, itipy=by-ih, itipx=bx+sway*p*0.7;
  flameOutline(bx,by,itipx,itipy,iw);
  var ig=fctx.createLinearGradient(0,by,0,itipy);
  ig.addColorStop(0.00,'rgba(255,205,86,0.60)');
  ig.addColorStop(0.50,'rgba(255,234,150,0.85)');
  ig.addColorStop(1.00,'rgba(255,205,90,0)');
  fctx.fillStyle=ig;fctx.fill();

  // 4. white-hot core low in the flame
  var cw=wmax*0.34, ch=h*0.42, ctipy=by-ch;
  flameOutline(bx,by,bx+sway*p*0.4,ctipy,cw);
  var cg=fctx.createLinearGradient(0,by,0,ctipy);
  cg.addColorStop(0.00,'rgba(255,250,236,'+(0.72*intensity)+')');
  cg.addColorStop(0.55,'rgba(255,247,224,'+(0.88*intensity)+')');
  cg.addColorStop(1.00,'rgba(255,238,196,0)');
  fctx.fillStyle=cg;fctx.fill();

  // 5. cool blue/translucent base hugging the wick
  var br=wmax*1.05, bcy=by-0.15*p;
  var bg=fctx.createRadialGradient(bx,bcy,0,bx,bcy,br);
  bg.addColorStop(0.00,'rgba(120,160,255,'+(0.40*intensity)+')');
  bg.addColorStop(0.65,'rgba(90,120,230,0.12)');
  bg.addColorStop(1.00,'rgba(90,120,230,0)');
  fctx.fillStyle=bg;fctx.beginPath();fctx.arc(bx,bcy,br,0,6.2832);fctx.fill();

  fctx.restore();
}

/* warm torch-glow wash behind the lamp (drawn on the BACK canvas) */
function drawLampGlow(cx,cy,p,extra){
  var litK=litCount/CONFIG.WICK_COUNT, amp=0.18+0.82*litK+(extra||0);
  if(amp<=0.01)return;
  var rad=p*(10+27*litK)+(extra||0)*p*42;
  ctx.globalCompositeOperation='lighter';
  var g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
  g.addColorStop(0,'rgba(255,231,160,'+(0.42*amp)+')');
  g.addColorStop(0.34,'rgba(244,180,80,'+(0.26*amp)+')');
  g.addColorStop(0.68,'rgba(232,96,44,'+(0.15*amp)+')');
  g.addColorStop(1,'rgba(172,34,81,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,rad,0,6.2832);ctx.fill();
  ctx.globalCompositeOperation='source-over';
}
/* warm floor pool beneath the lamp */
function drawFloorPool(m,extra){
  var litK=litCount/CONFIG.WICK_COUNT, amp=0.12+0.7*litK+(extra||0)*0.5;
  if(amp<=0.01)return;
  var cx=m.ax, cy=m.ay+30*m.p, rx=m.p*(17+9*litK), ry=m.p*(2.6+1.6*litK);
  ctx.globalCompositeOperation='lighter';
  ctx.save();ctx.translate(cx,cy);ctx.scale(1,ry/rx);
  var g=ctx.createRadialGradient(0,0,0,0,0,rx);
  g.addColorStop(0,'rgba(255,180,80,'+(0.32*amp)+')');
  g.addColorStop(0.5,'rgba(232,96,44,'+(0.16*amp)+')');
  g.addColorStop(1,'rgba(172,34,81,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,rx,0,6.2832);ctx.fill();
  ctx.restore();ctx.globalCompositeOperation='source-over';
}

/* =======================================================================
   ===========================  MAIN LOOP  ===============================
   ======================================================================= */
var lastT=now();
function frame(){
  var tNow=now(), dt=Math.min(0.05,(tNow-lastT)/1000); lastT=tNow; var t=tNow/1000;

  // ---- state timing: spin -> hold -> video ----
  if(STATE==='spin'){ if(tNow-spinStart>=CONFIG.SPIN_DURATION){STATE='hold';holdStart=tNow;
    document.body.classList.add('dim-lamp');   // spin done -> fade the lamp/scene out, leaving the title
  } }
  else if(STATE==='hold'){ if(tNow-holdStart>=CONFIG.HOLD_DURATION){enterVideo();} }

  // spin angle (ease-accelerate then smooth stop), flame fade-to-bloom, bloom amount
  var spinProg=0, spinAngle=0, flameAlpha=1, bloom=0;
  if(STATE==='spin'){
    spinProg=Math.min(1,(tNow-spinStart)/CONFIG.SPIN_DURATION);
    spinAngle=easeInOutCubic(spinProg)*CONFIG.TURNS*6.2832;   // integer turns => ends facing front
    flameAlpha=Math.max(0,1-spinProg*1.7);                    // dissolve discrete flames into the bloom
    bloom=Math.sin(spinProg*Math.PI)*0.95;
  } else if(STATE==='hold'){
    var hp=Math.min(1,(tNow-holdStart)/CONFIG.HOLD_DURATION);
    flameAlpha=Math.min(1,hp/0.28);                           // flames settle back as the lamp stops
    bloom=0.12+0.22*(1-Math.min(1,hp/0.4));
  } else if(STATE==='end'){ flameAlpha=1; bloom=0.2; }

  var lamp3dReady = !!(window.LAMP3D && window.LAMP3D.ok);
  lamp3dCanvas.style.visibility = lamp3dReady ? 'visible' : 'hidden';

  /* ===================== BACK CANVAS: night + ambient ===================== */
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
  drawBackdrop(t);
  for(var i=0;i<stars.length;i++){var st=stars[i];
    ctx.globalAlpha=st.a*(0.5+0.5*Math.sin(t*st.sp+st.tw));
    ctx.fillStyle=(i%6===0)?'#fff0e6':'#e7b9c8';
    ctx.fillRect(st.x,st.y,st.s,st.s);}
  ctx.globalAlpha=1;
  ctx.globalCompositeOperation='lighter';
  for(var f=0;f<embers.length;f++){var fl=embers[f];
    fl.x+=fl.vx*dt;fl.y+=fl.vy*dt;fl.vx+=rnd(-6,6)*dt;fl.vy+=rnd(-5,3)*dt;
    fl.vx=Math.max(-12,Math.min(12,fl.vx));fl.vy=Math.max(-14,Math.min(6,fl.vy));
    if(fl.x<-20)fl.x=W+20;if(fl.x>W+20)fl.x=-20;if(fl.y<-20)fl.y=H+20;if(fl.y>H+20)fl.y=-20;
    var pulse=0.4+0.6*Math.abs(Math.sin(t*1.3+fl.ph));var gr=fl.r*7;
    var gg=ctx.createRadialGradient(fl.x,fl.y,0,fl.x,fl.y,gr);
    gg.addColorStop(0,'rgba(255,200,120,'+(0.5*pulse)+')');gg.addColorStop(1,'rgba(255,150,70,0)');
    ctx.fillStyle=gg;ctx.beginPath();ctx.arc(fl.x,fl.y,gr,0,6.2832);ctx.fill();
    ctx.fillStyle='rgba(255,225,170,'+pulse+')';ctx.fillRect(fl.x-1,fl.y-1,2,2);}
  ctx.globalCompositeOperation='source-over';

  var m=lampMetrics(), p=m.p;
  // sensible defaults for the overlay anchor (used by 2D fallback + before 3D is ready):
  // wick tips sit on the short beak lips just above the rim, leaning outward.
  LAMPCX=m.ax; LAMPCY=m.ay+WICK2D_Y*p; PPU=p;
  WICKS.length=0;
  for(var s=0;s<SPOUTS.length;s++){ var sp=SPOUTS[s], d=sp<0?-1:1;
    WICKS.push({x:m.ax+(sp+d*1.0)*p, y:m.ay+WICK2D_Y*p, vis:true, lean:sp*0.05}); }

  var showLamp = (STATE!=='gate' && STATE!=='video');
  if(showLamp){
    drawFloorPool(m,bloom);

    if(lamp3dReady){
      // ----- real 3D lamp: spin it, render it, read back the wick projections -----
      window.LAMP3D.setSpin(spinAngle);
      window.LAMP3D.render(t);
      var pr=window.LAMP3D.project();           // {wicks:[{x,y,vis,lean}], bowl:{x,y}, ppu}
      if(pr){
        WICKS=pr.wicks; PPU=pr.ppu; LAMPCX=pr.bowl.x; LAMPCY=pr.bowl.y;
      }
    } else {
      // ----- 2D fallback lamp (drawn on the back canvas) -----
      ctx.save();ctx.translate(m.ax,m.ay);
      if(STATE==='spin'){                       // a gentle flat spin so the ceremony still reads
        var pivY=12*p, sc=1+0.08*Math.sin(spinProg*Math.PI);
        ctx.translate(0,pivY);ctx.rotate(spinAngle);ctx.scale(sc,sc);ctx.translate(0,-pivY);
      }
      drawLamp(p);
      ctx.restore();
    }
    drawLampGlow(LAMPCX,LAMPCY,PPU,bloom);
  }

  /* ===================== FRONT CANVAS: flames + fx ===================== */
  fctx.setTransform(DPR,0,0,DPR,0,0);
  fctx.globalAlpha=1;fctx.globalCompositeOperation='source-over';
  fctx.clearRect(0,0,W,H);

  if(showLamp && flameAlpha>0.01){
    var showAll=(STATE==='spin'||STATE==='hold'||STATE==='end');
    var n=showAll?CONFIG.WICK_COUNT:litCount;
    for(var k=0;k<n;k++){ var wk=WICKS[k]; if(wk && wk.vis!==false)
      drawFlameAt(wk.x,wk.y,PPU,t,k*2.1+0.5,wk.lean||0,flameAlpha); }
  }

  updateParticles(dt);
  updateConfetti(dt);
  drawRings();
  drawParticles();

  if(bloom>0.01){
    fctx.globalCompositeOperation='lighter';
    var br=Math.max(W,H)*0.7*bloom;
    var bg=fctx.createRadialGradient(LAMPCX,LAMPCY,0,LAMPCX,LAMPCY,br);
    bg.addColorStop(0,'rgba(255,236,176,'+(0.22*bloom)+')');
    bg.addColorStop(0.5,'rgba(232,96,44,'+(0.1*bloom)+')');
    bg.addColorStop(1,'rgba(172,34,81,0)');
    fctx.fillStyle=bg;fctx.beginPath();fctx.arc(LAMPCX,LAMPCY,br,0,6.2832);fctx.fill();
    fctx.globalCompositeOperation='source-over';
  }
  drawConfetti();   // confetti rides on top of everything
  requestAnimationFrame(frame);
}
function easeInOutCubic(x){return x<0.5?4*x*x*x:1-Math.pow(-2*x+2,3)/2;}

/* =======================================================================
   ============================  AUDIO  ==================================
   ======================================================================= */
var audioCtx=null;
function unlockAudio(){
  try{
    if(!audioCtx){var AC=window.AudioContext||window.webkitAudioContext;if(AC)audioCtx=new AC();}
    if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
    if(audioCtx){var o=audioCtx.createOscillator(),g=audioCtx.createGain();g.gain.value=0.0001;
      o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.03);}
  }catch(e){}
}
var NOTES=[523.25,587.33,659.25,783.99,880.00,987.77];   /* C5 D5 E5 G5 A5 B5 — one per wick */
function tone(freq,t0,dur,gp,type){
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type||'sine';o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t0);g.gain.exponentialRampToValueAtTime(gp,t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);o.connect(g);g.connect(audioCtx.destination);
  o.start(t0);o.stop(t0+dur+0.05);
}
function playChime(idx){if(muted||!audioCtx)return;try{var t0=audioCtx.currentTime,base=NOTES[Math.min(idx,NOTES.length-1)];
  tone(base,t0,0.9,0.28,'sine');tone(base*2,t0,0.7,0.12,'sine');tone(base*1.5,t0+0.02,0.55,0.07,'triangle');}catch(e){}}
function playChord(){if(muted||!audioCtx)return;try{var t0=audioCtx.currentTime;
  [523.25,659.25,783.99,1046.5].forEach(function(fr,i){tone(fr,t0+i*0.06,1.8,0.2,'sine');tone(fr*2,t0+i*0.06,1.2,0.06,'sine');});}catch(e){}}

/* =======================================================================
   =========================  YOUTUBE PLAYER  ============================
   ======================================================================= */
var player=null, ytReady=false, ytFailed=false, autoplayTimer=null;
var USE_LOCAL=!!(CONFIG.LOCAL_VIDEO_SRC && CONFIG.LOCAL_VIDEO_SRC.trim());
var localVid=document.getElementById('localvideo');
if(USE_LOCAL){
  /* ---- local .mp4 path: no network, no referrer issues ---- */
  localVid.src=CONFIG.LOCAL_VIDEO_SRC.trim();
  localVid.preload='auto'; localVid.load();
  localVid.addEventListener('ended', enterEnd);
  localVid.addEventListener('playing', hideClickToPlay);   // hide the overlay once playback actually begins
  localVid.addEventListener('error', function(){ if(STATE==='video') enterEnd(); });
}else{
  /* ---- YouTube fallback (requires serving over http, see CONFIG note) ---- */
  localVid.style.display='none';
  if(location.protocol==='file:'){
    console.warn('[inauguration] YouTube embeds DO NOT work when opening this file directly '+
      '(file://) — that is what causes "Error 153" (no referrer). Either set LOCAL_VIDEO_SRC '+
      'to a local .mp4, or serve this folder over http (e.g. `python -m http.server` then open '+
      'http://localhost:8000). The lamp ceremony itself still works fine.');
  }
  (function loadYT(){
    try{
      var tag=document.createElement('script');tag.src="https://www.youtube.com/iframe_api";
      tag.onerror=function(){ytFailed=true;};   // script blocked (offline) => graceful fallback
      var first=document.getElementsByTagName('script')[0];first.parentNode.insertBefore(tag,first);
    }catch(e){ytFailed=true;}
  })();
}
window.onYouTubeIframeAPIReady=function(){
  try{
    player=new YT.Player('ytplayer',{videoId:CONFIG.YOUTUBE_ID,
      host:'https://www.youtube-nocookie.com',   // privacy host; fewer embed blocks
      playerVars:{enablejsapi:1,controls:1,rel:0,modestbranding:1,playsinline:1,fs:0,iv_load_policy:3},
      events:{onReady:function(){ytReady=true;
        try{var f=player.getIframe(); if(f) f.referrerPolicy='strict-origin-when-cross-origin';}catch(e){}},
        onStateChange:onYTState,
        onError:function(){ytFailed=true;if(STATE==='video')enterEnd();}}});
  }catch(e){ytFailed=true;}
};
function onYTState(ev){if(ev.data===YT.PlayerState.ENDED)enterEnd();if(ev.data===YT.PlayerState.PLAYING)hideClickToPlay();}
/* prime playback during the gate gesture so later autoplay-with-sound is allowed */
function primeVideo(){
  if(USE_LOCAL){ try{ var pr=localVid.play(); if(pr&&pr.then)pr.then(function(){localVid.pause();localVid.currentTime=0;}).catch(function(){}); }catch(e){} return; }
  if(!player||!ytReady)return;
  try{player.playVideo();setTimeout(function(){try{player.pauseVideo();player.seekTo(0,true);}catch(e){}},360);}catch(e){}
}

/* =======================================================================
   ======================  FLOW / STATE MACHINE  =========================
   ======================================================================= */
var gateEl=document.getElementById('gate'), promptEl=document.getElementById('prompt'),
    revealEl=document.getElementById('reveal'), dotsEl=document.getElementById('dots'),
    ctpEl=document.getElementById('clicktoplay');

function buildDots(){dotsEl.innerHTML='';for(var i=0;i<CONFIG.WICK_COUNT;i++){var d=document.createElement('div');d.className='dot';dotsEl.appendChild(d);}}
function updateDots(){var ds=dotsEl.children;for(var i=0;i<ds.length;i++)ds[i].className='dot'+(i<litCount?' lit':'');}

function requestFS(){try{var el=document.documentElement,fn=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;if(fn)fn.call(el);}catch(e){}}

function start(){
  if(STATE!=='gate')return;
  requestFS();unlockAudio();primeVideo();
  STATE='lighting';litCount=0;updateDots();particles.length=0;rings.length=0;confetti.length=0;
  document.body.classList.remove('native-cursor');   // matchstick cursor for the lighting
  gateEl.classList.add('hide');setTimeout(function(){gateEl.style.display='none';},850);
  revealEl.classList.remove('show');promptEl.classList.add('show');
}
function lightNext(){
  if(STATE!=='lighting'||litCount>=CONFIG.WICK_COUNT)return;
  playChime(litCount);spawnBurst(litCount);litCount++;updateDots();
  if(litCount>=CONFIG.WICK_COUNT){promptEl.classList.remove('show');setTimeout(beginFinale,480);}
}
/* finale: a real Y-axis turntable spin of the brass lamp (reflections sweep across
   it), the five flames dissolving into a single radiant bloom + flourish, then the
   initiative title resolves and holds before the existing crossfade to the video. */
function beginFinale(){
  if(STATE!=='lighting')return;
  STATE='spin';spinStart=now();playChord();spawnFlourish();spawnConfetti();
  setTimeout(function(){ if(STATE==='spin'||STATE==='hold') revealEl.classList.add('show'); }, 850);
}
/* MANUAL PLAY ONLY: after the finale the player sits paused (primed during the gate
   so sound is allowed later). The audience must click CLICKS_TO_PLAY times to start it. */
var playClicks=0;
function enterVideo(){
  if(STATE==='video')return;STATE='video';litCount=CONFIG.WICK_COUNT;updateDots();
  playClicks=0;
  document.body.classList.add('to-video');   // commit to the crossfade
  document.body.classList.add('native-cursor');   // inauguration done -> normal mouse back
  if(USE_LOCAL){ try{ localVid.pause(); localVid.currentTime=0; }catch(e){} showClickToPlay(); return; }
  // YouTube: truly no player available (e.g. offline) -> stay on the lit-lamp scene, cleanly
  if(ytFailed && !player){ enterEnd(); return; }
  showClickToPlay();   // player is primed & paused; wait for deliberate clicks (never autoplays)
}
function startPlayback(){   // called only after CLICKS_TO_PLAY deliberate clicks
  try{
    if(USE_LOCAL){ localVid.muted=false; localVid.play(); }
    else if(player){ if(player.unMute)player.unMute(); if(player.setVolume)player.setVolume(100); player.seekTo(0,true); player.playVideo(); }
  }catch(e){}
}
function showClickToPlay(){ctpEl.classList.add('show');}
function hideClickToPlay(){ctpEl.classList.remove('show');}
function enterEnd(){STATE='end';litCount=CONFIG.WICK_COUNT;updateDots();
  if(window.LAMP3D && window.LAMP3D.setSpin) window.LAMP3D.setSpin(0);
  document.body.classList.remove('to-video');document.body.classList.remove('dim-lamp');document.body.classList.add('native-cursor');hideClickToPlay();
  try{ if(USE_LOCAL){localVid.pause();} else if(player){player.stopVideo();} }catch(e){}
  revealEl.classList.add('show');promptEl.classList.remove('show');}
function resetAll(){STATE='gate';litCount=0;updateDots();particles.length=0;rings.length=0;confetti.length=0;
  playClicks=0;   // reset the click-to-play counter
  if(window.LAMP3D && window.LAMP3D.setSpin) window.LAMP3D.setSpin(0);   // unwind the turntable
  document.body.classList.remove('native-cursor');   // matchstick back for the rerun
  clearTimeout(autoplayTimer);document.body.classList.remove('to-video');document.body.classList.remove('dim-lamp');hideClickToPlay();
  revealEl.classList.remove('show');promptEl.classList.remove('show');
  gateEl.style.display='flex';void gateEl.offsetWidth;gateEl.classList.remove('hide');
  try{ if(USE_LOCAL){localVid.pause();localVid.currentTime=0;} else if(player){player.stopVideo();player.seekTo(0,true);} }catch(e){}}
function jumpToVideo(){if(STATE==='video')return;litCount=CONFIG.WICK_COUNT;updateDots();revealEl.classList.add('show');enterVideo();}

/* =======================================================================
   ===========================  INPUT  ===================================
   ======================================================================= */
document.addEventListener('click',function(){
  if(STATE==='gate'){start();return;}
  if(STATE==='lighting'){lightNext();return;}
});
/* count deliberate clicks anywhere on the full-screen overlay (Air-Mouse friendly);
   only start playback once the threshold is reached. Overlay stays up until PLAYING. */
ctpEl.addEventListener('click',function(e){ e.stopPropagation();
  if(STATE!=='video') return;
  playClicks++;
  if(playClicks>=CONFIG.CLICKS_TO_PLAY){ startPlayback(); }   // overlay hides on the PLAYING event
});
document.addEventListener('keydown',function(e){
  var k=e.key;
  if(k===' '||k==='Spacebar'||k==='Enter'){e.preventDefault();
    if(STATE==='gate')start();else if(STATE==='lighting')lightNext();return;}
  if(k==='r'||k==='R'){resetAll();return;}
  if(k==='v'||k==='V'){jumpToVideo();return;}
  if(k==='m'||k==='M'){muted=!muted;
    try{ if(USE_LOCAL){localVid.muted=muted;} else if(player){muted?player.mute():player.unMute();} }catch(err){}return;}
});

/* ---- custom matchstick cursor ---- */
var cursorEl=document.getElementById('cursor');
var cx2=window.innerWidth/2, cy2=window.innerHeight/2;
document.addEventListener('mousemove',function(e){cx2=e.clientX;cy2=e.clientY;});
document.addEventListener('pointermove',function(e){cx2=e.clientX;cy2=e.clientY;});
(function cursorLoop(){cursorEl.style.transform='translate('+cx2+'px,'+cy2+'px)';requestAnimationFrame(cursorLoop);})();

/* =======================================================================
   ===========================  BOOT  ====================================
   ======================================================================= */
buildDots();updateDots();resize();requestAnimationFrame(frame);
/* dev/screenshot helper: open with ?shot to jump straight to the lit lamp */
if(/[?&]shot/.test(location.search)){ STATE='end'; litCount=CONFIG.WICK_COUNT; updateDots(); gateEl.classList.add('hide'); gateEl.style.display='none'; }
/* dev/QA: ?card shows the final title + logos card (lamp/scene faded) */
if(/[?&]card/.test(location.search)){ STATE='end'; litCount=CONFIG.WICK_COUNT; updateDots(); gateEl.classList.add('hide'); gateEl.style.display='none'; document.body.classList.add('dim-lamp'); revealEl.classList.add('show'); }
</script>

<!-- =======================================================================
     ============  REAL 3D BRASS LAMP (three.js, ES module)  ===============
     Replaces only the lamp BODY + spin. Reads the 2D profile globals, revolves
     them into one lathe, lights it with a procedural environment map, and
     exposes window.LAMP3D for the classic loop. Falls back to the 2D lamp if
     WebGL is unavailable or the context is lost.
     ======================================================================= -->
<script type="module">
import * as THREE from 'three';

(function(){
  var canvas = document.getElementById('lamp3d');
  var renderer;
  try{
    renderer = new THREE.WebGLRenderer({canvas:canvas, alpha:true, antialias:true, premultipliedAlpha:true, powerPreference:'high-performance'});
    if(!renderer.getContext()) throw new Error('no gl context');
  }catch(e){ window.LAMP3D = {ok:false}; return; }

  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 1.75));
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.12;
  renderer.setClearColor(0x000000, 0);

  var scene  = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(30, window.innerWidth/window.innerHeight, 0.1, 100);

  /* ---------- procedural environment: a dark room with a bright key band up top
     and a warm magenta/gold floor bounce below. As the lamp turns, these sweep
     across the polished brass — which is what sells it as real metal. ---------- */
  function makeEnvCanvas(){
    var c=document.createElement('canvas'); c.width=1024; c.height=512; var g=c.getContext('2d');
    var base=g.createLinearGradient(0,0,0,512);             // warm-dark room (not pure black -> brass keeps colour)
    base.addColorStop(0.00,'#26242c'); base.addColorStop(0.42,'#191720');
    base.addColorStop(0.60,'#15101a'); base.addColorStop(1.00,'#26131d');
    g.fillStyle=base; g.fillRect(0,0,1024,512);
    var k=g.createRadialGradient(360,150,8, 360,150,400);   // soft warm key light / window
    k.addColorStop(0,'rgba(255,247,228,1)'); k.addColorStop(0.5,'rgba(248,232,200,0.5)'); k.addColorStop(1,'rgba(248,232,200,0)');
    g.fillStyle=k; g.fillRect(0,0,1024,340);
    var kw=g.createLinearGradient(0,40,0,200);              // gentle sky band (subtle overall lift)
    kw.addColorStop(0,'rgba(214,212,200,0.28)'); kw.addColorStop(1,'rgba(214,212,200,0)');
    g.fillStyle=kw; g.fillRect(0,40,1024,160);
    var k2=g.createRadialGradient(826,120,6, 826,120,300);  // cool fill, upper-right
    k2.addColorStop(0,'rgba(205,222,255,0.72)'); k2.addColorStop(1,'rgba(205,222,255,0)');
    g.fillStyle=k2; g.fillRect(0,0,1024,330);
    var fb=g.createLinearGradient(0,330,0,512);             // warm brand floor bounce
    fb.addColorStop(0,'rgba(150,40,70,0)'); fb.addColorStop(0.5,'rgba(178,56,62,0.45)'); fb.addColorStop(1,'rgba(232,150,70,0.62)');
    g.fillStyle=fb; g.fillRect(0,330,1024,182);
    return c;
  }
  var pmrem = new THREE.PMREMGenerator(renderer);
  var envSrc = new THREE.CanvasTexture(makeEnvCanvas());
  envSrc.mapping = THREE.EquirectangularReflectionMapping;
  envSrc.colorSpace = THREE.SRGBColorSpace;
  var envRT = pmrem.fromEquirectangular(envSrc);
  scene.environment = envRT.texture;
  envSrc.dispose(); pmrem.dispose();

  /* ---------- brass material with faint procedural roughness (micro-imperfection) ---------- */
  function makeRoughTex(){
    var c=document.createElement('canvas'); c.width=256; c.height=256; var g=c.getContext('2d');
    var img=g.createImageData(256,256), d=img.data;
    for(var i=0;i<256*256;i++){ var v=205 + ((Math.random()*Math.random())-0.4)*60; v=Math.max(170,Math.min(245,v|0));
      d[i*4]=d[i*4+1]=d[i*4+2]=v; d[i*4+3]=255; }
    g.putImageData(img,0,0);
    var tex=new THREE.CanvasTexture(c); tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.repeat.set(3,6); return tex;
  }
  var brass = new THREE.MeshStandardMaterial({
    color:0xD8AC42, metalness:1.0, roughness:0.36, roughnessMap:makeRoughTex(), envMapIntensity:1.32
  });

  /* ---------- build ONE lathe profile from the 2D turned-profile globals ---------- */
  var S = 0.10;   // world units per lamp-unit
  function pushRibs(P){                       // ribbed section as real turned grooves
    var y0=6.6,y1=11.2,r0=1.44,r1=1.00,cycles=7,n=84;
    for(var i=0;i<=n;i++){ var ff=i/n, y=y0+(y1-y0)*ff, r=(r0+(r1-r0)*ff)+0.075*Math.cos(ff*6.2832*cycles - Math.PI); P.push([y,r]); }
  }
  function buildProfile(){
    var P=[];
    function arr(a,skip){ for(var i=skip?1:0;i<a.length;i++) P.push([a[i][0],a[i][1]]); }
    arr(window.E_FINIAL,false);               // spire .. collar
    P.push([-2.3,0.80]);                        // post down to a SHALLOW dish-floor centre
    // shallow saucer dish (3D-specific: flatter than the 2D side-silhouette so it
    // doesn't revolve into a deep funnel) — floor rises gently to a wide rim, then
    // a concave underside curves down to a slim neck.
    var bowl=[[-2.6,10.9],[-2.92,11.5],[-2.6,11.15],[-1.9,9.7],[-0.9,7.0],[0.1,4.8],[0.9,3.4],[1.7,2.7]];
    for(var bi=0;bi<bowl.length;bi++) P.push(bowl[bi]);
    arr(window.E_COLLAR,false);                // decorative ring under the dish
    arr(window.E_KNOB1,true);
    pushRibs(P);                               // ribbed taper (with grooves)
    arr(window.E_BULB,false);
    P.push([14.0,1.04]); P.push([15.25,1.04]); P.push([15.4,0.93]); P.push([15.55,1.04]); P.push([16.9,1.04]); // stem + ring groove
    arr(window.E_KNOB2,false);
    arr(window.E_DOME,false);                  // centre bell of the foot
    P.push([26.0,8.0]); P.push([26.0,11.4]); P.push([26.0,11.6]); // wide flat saucer brim
    P.push([27.0,11.6]);                                          // outer rim edge (thickness)
    P.push([27.05,9.0]); P.push([27.05,4.0]); P.push([27.05,0.0]);// underside back to the axis
    return P;
  }
  var prof = buildProfile();
  var pts = prof.map(function(q){ return new THREE.Vector2(Math.max(q[1],0.0008)*S, -q[0]*S); });
  var body = new THREE.Mesh(new THREE.LatheGeometry(pts, 160), brass);

  var lamp = new THREE.Group(); lamp.add(body);

  /* ---------- six beaks: short broad brass LIPS growing out of the rim (every ~30deg
     across the front arc, all facing the camera) + a dark wick nub at each tip ---------- */
  var markers=[], beakAz=[-1.309,-0.785,-0.262,0.262,0.785,1.309];   // -75..+75 deg, 30deg apart
  // truncated cone: WIDE base (sits in the bowl wall) -> small rounded lip at the tip
  var beakGeo=new THREE.CylinderGeometry(0.16*S, 0.80*S, 1.5*S, 20);
  var wickGeo=new THREE.SphereGeometry(0.14*S, 10, 8);
  var darkWick=new THREE.MeshStandardMaterial({color:0x1a0f06, roughness:0.92, metalness:0.05});
  var baseR=9.0*S, baseY=2.45*S, tipR=11.55*S, tipY=3.0*S;   // base overlaps the rim; lip just past it, gently up
  for(var b=0;b<beakAz.length;b++){
    var gb=new THREE.Group(); gb.rotation.y=beakAz[b];
    var lip=new THREE.Mesh(beakGeo, brass);                  // same brass -> reads as one casting
    lip.position.set(0,(baseY+tipY)/2,(baseR+tipR)/2);
    lip.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), new THREE.Vector3(0, tipY-baseY, tipR-baseR).normalize());
    gb.add(lip);
    var nub=new THREE.Mesh(wickGeo, darkWick); nub.position.set(0, tipY, tipR); gb.add(nub);
    var mk=new THREE.Object3D(); mk.position.set(0, tipY, tipR); gb.add(mk);   // flame anchors here
    lamp.add(gb); markers.push(mk);
  }
  scene.add(lamp);

  /* ---------- lights: one crisp key from upper-left, a cool fill, low ambient ---------- */
  var key=new THREE.DirectionalLight(0xfff1d6, 1.5); key.position.set(-5,7,4); scene.add(key);
  var fill=new THREE.DirectionalLight(0xbcd0ff, 0.35); fill.position.set(6,2,5); scene.add(fill);
  var rim=new THREE.DirectionalLight(0xffd9a0, 0.5); rim.position.set(2,-3,-5); scene.add(rim);  // warm back-rim
  scene.add(new THREE.AmbientLight(0x3a3040, 0.45));

  /* ---------- frame the camera straight-on and slightly above ---------- */
  var box=new THREE.Box3().setFromObject(lamp);
  var ctr=box.getCenter(new THREE.Vector3());
  var size=box.getSize(new THREE.Vector3());
  lamp.position.y -= ctr.y;                                   // recentre vertically about origin
  var bowlY = 3.0*S - ctr.y;                                  // flame/lip height (glow + bloom centre here)
  var camDist = (size.y*0.5)/Math.tan((30*Math.PI/360)) * 1.14;
  camera.position.set(0, size.y*0.10, camDist);
  camera.lookAt(0, size.y*0.02, 0);

  /* ---------- API exposed to the classic loop ---------- */
  function toScreen(v){ v.project(camera); return {x:(v.x*0.5+0.5)*window.innerWidth, y:(-v.y*0.5+0.5)*window.innerHeight, z:v.z}; }

  // dev/QA aid: ?spin=<radians> freezes the turntable at a fixed angle for screenshots
  var DBGSPIN = /[?&]spin=([0-9.]+)/.test(location.search) ? parseFloat(RegExp.$1) : null;
  var API = {
    ok:true,
    setSpin:function(a){ lamp.rotation.y = (DBGSPIN!=null) ? DBGSPIN : (a||0); },
    setSize:function(w,h,dpr){
      camera.aspect=w/h; camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(dpr||window.devicePixelRatio||1,1.75));
      renderer.setSize(w,h,false);
    },
    render:function(){ try{ renderer.render(scene,camera); }catch(e){ API.ok=false; } },
    project:function(){
      try{
        var bowlS=toScreen(new THREE.Vector3(0,bowlY,0));
        var upS  =toScreen(new THREE.Vector3(0,bowlY+S,0));
        var ppu=Math.hypot(upS.x-bowlS.x, upS.y-bowlS.y); if(!(ppu>1)) ppu=10;
        var wicks=[];
        for(var i=0;i<markers.length;i++){
          var wp=markers[i].getWorldPosition(new THREE.Vector3());
          var ss=toScreen(wp.clone());
          var lean=Math.max(-0.6,Math.min(0.6,((ss.x-bowlS.x)/ppu)*0.06));
          wicks.push({x:ss.x, y:ss.y, vis:(wp.z>-0.15*S && ss.z<1), lean:lean});
        }
        return {wicks:wicks, bowl:{x:bowlS.x,y:bowlS.y}, ppu:ppu};
      }catch(e){ return null; }
    }
  };
  canvas.addEventListener('webglcontextlost', function(e){ e.preventDefault(); API.ok=false; }, false);
  window.LAMP3D = API;
})();
</script>
</body>
</html>
